<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Dalaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>
  // Force HTTPS
  if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    location.replace(location.href.replace('http:', 'https:'));
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0f1117;
      --bg2:    #1a1d27;
      --bg3:    #23273a;
      --border: #2e3347;
      --text:   #f0f0f0;
      --muted:  #8b92a5;
      --muted2: #555e74;
      --accent: #2c4a7c;
      --accent2:#3a62a3;
      --green:  #237804;
      --green2: #52c41a;
      --yellow: #d4a017;
      --red:    #cf1322;
      --shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: block; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; background: var(--bg);
    }
    .login-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .login-logo span { color: #ffd666; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 6px; text-align: left; }
    .login-input {
      width: 100%; padding: 12px 14px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text);
      outline: none; transition: border-color .15s; margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--accent2); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .login-btn:hover { background: var(--accent2); }
    .login-err { font-size: 12px; color: #ff6b6b; margin-top: 12px; display: none; }

    /* ── LAYOUT ── */
    .admin-wrap { display: none; min-height: 100vh; }
    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; gap: 16px; height: 60px;
    }
    .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; color: var(--text); text-decoration: none; }
    .logo span { color: #ffd666; }
    .admin-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-logout:hover { border-color: var(--text); color: var(--text); }

    /* ── CONTENT ── */
    .content { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    @media (max-width: 800px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 900; color: var(--text); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg2); color: var(--muted); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .search-input {
      margin-left: auto; padding: 7px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; font-family: 'Inter', sans-serif;
      font-size: 12px; color: var(--text); outline: none; width: 200px;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--accent2); }
    .search-input::placeholder { color: var(--muted2); }

    /* ── ORDERS TABLE ── */
    .orders-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .orders-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .orders-title { font-size: 14px; font-weight: 800; }
    .orders-count { font-size: 12px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); background: var(--bg3); }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }
    .order-id { font-weight: 800; color: #ffd666; font-size: 12px; }
    .order-name { font-weight: 700; }
    .order-contact { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .order-items { font-size: 12px; color: var(--muted); max-width: 200px; }
    .order-total { font-weight: 800; color: var(--text); }
    .order-date { font-size: 12px; color: var(--muted); }

    /* Status badges */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .badge-pendiente  { background: rgba(212,160,23,.15);  color: #d4a017; }
    .badge-confirmado { background: rgba(44,74,124,.2);    color: #6b9fe4; }
    .badge-enviado    { background: rgba(82,196,26,.15);   color: #52c41a; }
    .badge-entregado  { background: rgba(35,120,4,.2);     color: #73d13d; }
    .badge-cancelado  { background: rgba(207,19,34,.15);   color: #ff4d4f; }

    /* Status select */
    .status-select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 700; padding: 5px 8px;
      border-radius: 6px; cursor: pointer; outline: none;
      transition: border-color .15s;
    }
    .status-select:focus { border-color: var(--accent2); }

    /* ── ORDER DETAIL MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: none; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg2); z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 800; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: color .15s; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-section { margin-bottom: 22px; }
    .modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 12px; }
    .modal-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
    .modal-row span:first-child { color: var(--muted); }
    .modal-row span:last-child { font-weight: 600; color: var(--text); text-align: right; max-width: 280px; }
    .modal-items-table { width: 100%; border-collapse: collapse; }
    .modal-items-table td { padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .modal-items-table tr:last-child td { border-bottom: none; }
    .modal-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; padding-top: 14px; border-top: 2px solid var(--border); margin-top: 8px; }

    /* ── EMPTY / LOADING ── */
    .table-empty { padding: 60px 20px; text-align: center; color: var(--muted); }
    .table-empty .icon { font-size: 36px; margin-bottom: 12px; }
    .loading { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 999; transform: translateY(20px); }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 800px) {
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">Dala<span>ran</span></div>
    <div class="login-sub">Panel de administración</div>
    <label class="login-label" for="adminKey">Clave de acceso</label>
    <input class="login-input" id="adminKey" type="password" placeholder="••••••••••••" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">Ingresar</button>
    <div class="login-err" id="loginErr">Clave incorrecta</div>
  </div>
</div>

<!-- ── ADMIN ── -->
<div class="admin-wrap" id="adminWrap">

  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">Dala<span>ran</span></a>
      <span class="admin-badge">Admin</span>
      <div class="header-right">
        <span id="headerDate" style="font-size:12px;color:var(--muted)"></span>
        <button class="btn-logout" id="logoutBtn">Salir</button>
      </div>
    </div>
  </header>

  <div class="content">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total pedidos</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">histórico</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value" id="statPending" style="color:#d4a017">—</div>
        <div class="stat-sub">requieren acción</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Enviados</div>
        <div class="stat-value" id="statShipped" style="color:#52c41a">—</div>
        <div class="stat-sub">en camino</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Facturado</div>
        <div class="stat-value" id="statRevenue">—</div>
        <div class="stat-sub">total entregado</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="pendiente">Pendientes</button>
      <button class="filter-btn" data-filter="confirmado">Confirmados</button>
      <button class="filter-btn" data-filter="enviado">Enviados</button>
      <button class="filter-btn" data-filter="entregado">Entregados</button>
      <button class="filter-btn" data-filter="cancelado">Cancelados</button>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar nombre o email...">
    </div>

    <!-- Orders table -->
    <div class="orders-card">
      <div class="orders-header">
        <span class="orders-title">Pedidos</span>
        <span class="orders-count" id="ordersCount"></span>
      </div>
      <div id="tableWrap">
        <div class="loading"><span class="spinner"></span>Cargando pedidos...</div>
      </div>
    </div>

  </div>
</div>

<!-- ── ORDER DETAIL MODAL ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Pedido #—</span>
      <button class="modal-close" id="modalClose">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {

  var API_URL    = "https://dalaran-backend-production.up.railway.app";
  var SESSION_KEY = "dalaran_admin_key";
  var adminKey   = "";
  var allOrders  = [];
  var activeFilter = "todos";

  // ── HELPERS ──
  function fmt(n) {
    if (!isFinite(n)) return "—";
    try { return new Intl.NumberFormat("es-UY",{style:"currency",currency:"UYU",maximumFractionDigits:0}).format(n); }
    catch(e) { return "UYU "+n; }
  }

  function fmtDate(str) {
    if (!str) return "—";
    try {
      var d = new Date(str.replace(" ", "T") + "Z");
      return d.toLocaleDateString("es-UY", { day:"2-digit", month:"2-digit", year:"numeric", timeZone:"America/Montevideo" })
        + " " + d.toLocaleTimeString("es-UY", { hour:"2-digit", minute:"2-digit", timeZone:"America/Montevideo" });
    } catch(e) { return str; }
  }

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(t._t);
    t._t = setTimeout(function(){ t.classList.remove("show"); }, 2800);
  }

  var STATUS_LABELS = {
    pendiente: "Pendiente", confirmado: "Confirmado",
    enviado: "Enviado", entregado: "Entregado", cancelado: "Cancelado"
  };

  // ── LOGIN ──
  document.getElementById("loginBtn").addEventListener("click", tryLogin);
  document.getElementById("adminKey").addEventListener("keydown", function(e){ if(e.key==="Enter") tryLogin(); });

  // Check session — verify it still works before showing admin
  var saved = sessionStorage.getItem(SESSION_KEY);
  if (saved) {
    adminKey = saved;
    fetch(API_URL + "/api/admin/orders", { headers: { "x-admin-key": saved } })
      .then(function(r) {
        if (r.status === 401) throw new Error("unauthorized");
        return r.json();
      })
      .then(function(data) {
        allOrders = data.orders || [];
        showAdmin();
        renderAll();
      })
      .catch(function() {
        // Session expired or invalid — show login
        sessionStorage.removeItem(SESSION_KEY);
        adminKey = "";
      });
  }

  function tryLogin() {
    var key = document.getElementById("adminKey").value.trim();
    if (!key) return;
    adminKey = key;
    // Verify by fetching orders
    fetch(API_URL + "/api/admin/orders", { headers: { "x-admin-key": key } })
      .then(function(r) {
        if (r.status === 401) throw new Error("unauthorized");
        return r.json();
      })
      .then(function(data) {
        sessionStorage.setItem(SESSION_KEY, key);
        allOrders = data.orders || [];
        showAdmin();
        renderAll();
      })
      .catch(function(err) {
        if (err.message === "unauthorized") {
          document.getElementById("loginErr").style.display = "block";
        } else {
          document.getElementById("loginErr").textContent = "Error de conexión";
          document.getElementById("loginErr").style.display = "block";
        }
      });
  }

  function showAdmin() {
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("adminWrap").style.display = "";
    document.getElementById("headerDate").textContent =
      new Date().toLocaleDateString("es-UY", { weekday:"long", day:"numeric", month:"long" });
    if (allOrders.length === 0) loadOrders();
  }

  // ── LOGOUT ──
  document.getElementById("logoutBtn").addEventListener("click", function() {
    sessionStorage.removeItem(SESSION_KEY);
    adminKey = ""; allOrders = [];
    document.getElementById("loginWrap").style.display = "";
    document.getElementById("adminWrap").style.display = "none";
    document.getElementById("adminKey").value = "";
    document.getElementById("loginErr").style.display = "none";
  });

  // ── LOAD ORDERS ──
  function loadOrders() {
    document.getElementById("tableWrap").innerHTML = '<div class="loading"><span class="spinner"></span>Cargando pedidos...</div>';
    fetch(API_URL + "/api/admin/orders", { headers: { "x-admin-key": adminKey } })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        allOrders = data.orders || [];
        renderAll();
      })
      .catch(function() {
        document.getElementById("tableWrap").innerHTML = '<div class="table-empty"><div class="icon">⚠️</div><p>Error cargando pedidos</p></div>';
      });
  }

  // ── FILTERS & SEARCH ──
  document.querySelectorAll(".filter-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      activeFilter = btn.dataset.filter;
      renderTable();
    });
  });

  document.getElementById("searchInput").addEventListener("input", renderTable);

  function getFiltered() {
    var q = document.getElementById("searchInput").value.toLowerCase().trim();
    return allOrders.filter(function(o) {
      if (activeFilter !== "todos" && o.status !== activeFilter) return false;
      if (q && !o.name.toLowerCase().includes(q) && !o.email.toLowerCase().includes(q)) return false;
      return true;
    });
  }

  // ── RENDER ──
  function renderAll() {
    renderStats();
    renderTable();
  }

  function renderStats() {
    document.getElementById("statTotal").textContent = allOrders.length;
    document.getElementById("statPending").textContent = allOrders.filter(function(o){ return o.status==="pendiente"; }).length;
    document.getElementById("statShipped").textContent = allOrders.filter(function(o){ return o.status==="enviado"; }).length;
    var revenue = allOrders.filter(function(o){ return o.status==="entregado"; }).reduce(function(s,o){ return s+o.total; }, 0);
    document.getElementById("statRevenue").textContent = fmt(revenue);
  }

  function renderTable() {
    var orders = getFiltered();
    document.getElementById("ordersCount").textContent = orders.length + " pedido" + (orders.length!==1?"s":"");

    if (orders.length === 0) {
      document.getElementById("tableWrap").innerHTML = '<div class="table-empty"><div class="icon">📭</div><p>No hay pedidos con ese filtro</p></div>';
      return;
    }

    var rows = orders.map(function(o) {
      var items = Array.isArray(o.items) ? o.items : [];
      var itemsText = items.map(function(i){ return i.name + " ×" + i.qty; }).join(", ");
      return '<tr data-id="'+o.id+'" style="cursor:pointer">'
        + '<td><span class="order-id">#'+o.id+'</span><div class="order-date">'+fmtDate(o.created_at)+'</div></td>'
        + '<td><div class="order-name">'+o.name+'</div><div class="order-contact">'+o.email+'<br>'+o.phone+'</div></td>'
        + '<td><div class="order-items">'+itemsText.substring(0,60)+(itemsText.length>60?"…":"")+'</div></td>'
        + '<td><span class="order-total">'+fmt(o.total)+'</span></td>'
        + '<td><select class="status-select" data-id="'+o.id+'" onclick="event.stopPropagation()">'
        + Object.keys(STATUS_LABELS).map(function(s){
            return '<option value="'+s+'"'+(o.status===s?" selected":"")+'>'+STATUS_LABELS[s]+'</option>';
          }).join("")
        + '</select></td>'
        + '</tr>';
    }).join("");

    document.getElementById("tableWrap").innerHTML =
      '<table><thead><tr>'
      + '<th>Pedido</th><th>Cliente</th><th>Productos</th><th>Total</th><th>Estado</th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table>';

    // Row click → modal
    document.querySelectorAll("tr[data-id]").forEach(function(row) {
      row.addEventListener("click", function() { openModal(parseInt(row.dataset.id)); });
    });

    // Status change
    document.querySelectorAll(".status-select").forEach(function(sel) {
      sel.addEventListener("change", function() {
        updateStatus(parseInt(sel.dataset.id), sel.value);
      });
    });
  }

  // ── UPDATE STATUS ──
  function updateStatus(id, status) {
    fetch(API_URL + "/api/admin/orders/" + id + "/status", {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-admin-key": adminKey },
      body: JSON.stringify({ status: status }),
    })
    .then(function(r){ return r.json(); })
    .then(function() {
      var order = allOrders.find(function(o){ return o.id===id; });
      if (order) order.status = status;
      renderStats();
      showToast("Pedido #"+id+" → "+STATUS_LABELS[status]);
    })
    .catch(function() { showToast("Error al actualizar"); });
  }

  // ── MODAL ──
  function openModal(id) {
    var o = allOrders.find(function(o){ return o.id===id; });
    if (!o) return;
    var items = Array.isArray(o.items) ? o.items : [];

    document.getElementById("modalTitle").textContent = "Pedido #"+o.id;

    var itemRows = items.map(function(i) {
      return '<tr><td>'+i.name+'</td><td style="text-align:center;color:var(--muted)">×'+i.qty+'</td><td style="text-align:right;font-weight:700">'+fmt(i.priceValue*i.qty)+'</td></tr>';
    }).join("");

    document.getElementById("modalBody").innerHTML =
      '<div class="modal-section">'
      + '<div class="modal-section-title">Cliente</div>'
      + '<div class="modal-row"><span>Nombre</span><span>'+o.name+'</span></div>'
      + '<div class="modal-row"><span>Email</span><span><a href="mailto:'+o.email+'" style="color:#6b9fe4">'+o.email+'</a></span></div>'
      + '<div class="modal-row"><span>Teléfono</span><span><a href="tel:'+o.phone+'" style="color:#6b9fe4">'+o.phone+'</a></span></div>'
      + '<div class="modal-row"><span>Dirección</span><span>'+o.address+'</span></div>'
      + (o.notes ? '<div class="modal-row"><span>Notas</span><span>'+o.notes+'</span></div>' : '')
      + '</div>'
      + '<div class="modal-section">'
      + '<div class="modal-section-title">Productos</div>'
      + '<table class="modal-items-table"><tbody>'+itemRows+'</tbody></table>'
      + '<div class="modal-row" style="margin-top:10px"><span style="color:var(--muted)">Envío</span><span>'+fmt(o.shipping)+'</span></div>'
      + '<div class="modal-total"><span>Total</span><span style="color:#ffd666">'+fmt(o.total)+'</span></div>'
      + '</div>'
      + '<div class="modal-section">'
      + '<div class="modal-section-title">Estado</div>'
      + '<div class="modal-row"><span>Fecha</span><span>'+fmtDate(o.created_at)+'</span></div>'
      + '<div class="modal-row"><span>Estado actual</span><span><span class="badge badge-'+o.status+'">'+STATUS_LABELS[o.status]+'</span></span></div>'
      + '</div>';

    document.getElementById("modalOverlay").classList.add("open");
  }

  document.getElementById("modalClose").addEventListener("click", function() {
    document.getElementById("modalOverlay").classList.remove("open");
  });
  document.getElementById("modalOverlay").addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("open");
  });

})();
</script>
</body>
</html>
