<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dalaran — Juegos de Mesa Montevideo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f5f4f0;
      --bg2:     #ffffff;
      --bg3:     #edecea;
      --border:  #e2e0db;
      --text:    #1a1814;
      --muted:   #6b6760;
      --muted2:  #9b9890;
      --accent:  #d4380d;
      --accent2: #f05a2a;
      --green:   #237804;
      --blue:    #1d4ed8;
      --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --shadow2: 0 2px 8px rgba(0,0,0,.1), 0 8px 24px rgba(0,0,0,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOP BANNER ── */
    .top-banner {
      background: var(--text);
      color: #fff;
      text-align: center;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .2px;
    }
    .top-banner strong { color: #ffd666; }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 2px solid var(--text);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header-main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 64px;
    }
    .logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--accent); }
    .search-wrap {
      flex: 1;
      max-width: 560px;
      position: relative;
    }
    .search {
      width: 100%;
      padding: 10px 16px 10px 42px;
      border: 2px solid var(--text);
      border-radius: 6px;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,56,13,.12); }
    .search::placeholder { color: var(--muted2); font-weight: 400; }
    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 2px solid var(--text);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      background: var(--bg2);
      white-space: nowrap;
    }
    .stat-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    .btn {
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { border-color: var(--text); background: var(--bg3); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn.danger:hover { border-color: #cc0000; color: #cc0000; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .toolbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 48px;
      flex-wrap: wrap;
    }
    .toolbar-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-right: 4px;
    }
    .price-range { display: flex; align-items: center; gap: 6px; }
    .price-range .sep { font-size: 12px; color: var(--muted2); }
    .num {
      width: 88px;
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    .num:focus { border-color: var(--accent); }
    .num::placeholder { color: var(--muted2); }
    .divider-v { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    #hint {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-left: auto;
    }
    #hint.ok  { color: var(--green); }
    #hint.err { color: var(--accent); }

    /* ── HERO STRIP ── */
    .hero {
      background: var(--text);
      color: #fff;
    }
    .hero-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 24px;
      display: flex;
      align-items: flex-end;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-title {
      font-size: clamp(36px, 5vw, 68px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: .95;
    }
    .hero-title em { color: #ffd666; font-style: normal; }
    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 6px;
    }
    .hero-meta p { font-size: 14px; color: rgba(255,255,255,.6); line-height: 1.5; max-width: 280px; }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      width: fit-content;
    }
    .hero-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #52c41a; }

    /* ── MAIN ── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── RESULTS HEADER ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }
    .results-count strong { color: var(--text); }
    .sort-wrap { display: flex; align-items: center; gap: 8px; }
    .sort-label { font-size: 12px; font-weight: 600; color: var(--muted); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: none;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .18s, transform .18s;
      animation: fadeIn .3s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      box-shadow: var(--shadow2);
      z-index: 2;
      transform: translateY(-2px);
    }

    /* ── CARD IMAGE ── */
    .card-img-wrap {
      position: relative;
      background: var(--bg3);
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: transform .3s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.04); }
    .card-no-img {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: .2;
    }

    /* wishlist btn */
    .card-wish {
      position: absolute;
      top: 8px; right: 8px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .2s, transform .2s;
      box-shadow: var(--shadow);
      z-index: 2;
    }
    .card:hover .card-wish { opacity: 1; transform: translateY(0); }

    /* badges */
    .card-badges {
      position: absolute;
      top: 8px; left: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .badge {
      padding: 3px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .3px;
      text-transform: uppercase;
      width: fit-content;
    }
    .badge-instock { background: var(--green); color: #fff; }
    .badge-new     { background: var(--blue); color: #fff; }

    /* quick-add bar */
    .card-add {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px;
      background: var(--text);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      letter-spacing: .3px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(100%);
      transition: opacity .2s, transform .2s;
    }
    .card:hover .card-add { opacity: 1; transform: translateY(0); }

    /* ── CARD BODY ── */
    .card-body {
      padding: 12px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .card-brand {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: auto;
    }
    .card-price {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.4px;
    }
    .card-price-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* ── SKELETON ── */
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 1600px 100%;
      animation: shimmer 1.4s infinite linear;
      aspect-ratio: 1.2;
    }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1/-1;
      padding: 80px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty p { font-size: 14px; font-weight: 500; }

    /* ── FOOTER COUNT ── */
    .footer-bar {
      padding: 24px 0 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .header-main { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
      .logo { font-size: 20px; }
      .search-wrap { order: 3; flex: 1 1 100%; max-width: 100%; }
      .hero-inner { padding: 28px 16px; }
      .toolbar-inner { padding: 0 16px; height: auto; padding: 8px 16px; }
      main { padding: 16px 16px 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- TOP BANNER -->
<div class="top-banner">
  Todos los juegos in-stock &mdash; Montevideo Gaming House &mdash; <strong>Envíos a todo Uruguay</strong>
</div>

<!-- HEADER -->
<header>
  <div class="header-main">
    <a class="logo" href="#">Dala<span>ran</span></a>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input id="q" class="search" placeholder="Buscar juego de mesa..." autocomplete="off" />
    </div>
    <div class="header-right">
      <div class="stat-chip">
        <div class="dot"></div>
        <span id="countTotal">—</span> in-stock
      </div>
      <button id="exportCsv" class="btn primary">&#8595; CSV</button>
      <button id="stop" class="btn danger">&#9632; Detener</button>
      <button id="top" class="btn">&#8593;</button>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-inner">
    <span class="toolbar-label">Precio</span>
    <div class="price-range">
      <input id="minP" class="num" type="number" inputmode="numeric" placeholder="Mín $" />
      <span class="sep">—</span>
      <input id="maxP" class="num" type="number" inputmode="numeric" placeholder="Máx $" />
      <button id="clearPrice" class="btn">&#10005;</button>
    </div>
    <div class="divider-v"></div>
    <button id="sort" class="btn">&#8597; <span id="sortLabel">Relevancia</span></button>
    <span id="hint">Conectando...</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <h1 class="hero-title">Juegos<br>de <em>Mesa</em></h1>
    <div class="hero-meta">
      <div class="hero-badge"><div class="dot"></div>Stock en tiempo real</div>
      <p>Catálogo completo de Montevideo Gaming House. Precios actualizados, solo productos disponibles.</p>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="results-header">
    <div class="results-count" id="resultsCount">Cargando productos...</div>
    <div class="sort-wrap">
      <span class="sort-label">MGH</span>
    </div>
  </div>
  <div id="grid" class="grid"></div>
  <div id="footer" class="footer-bar"></div>
</main>

<script>
(async () => {
  var PER_PAGE   = 100;
  var PROXY_BASE = "https://dalaran-proxy.gonzalo-carignani.workers.dev";
  var apiBase    = PROXY_BASE + "/api";
  var $ = function(s) { return document.querySelector(s); };

  var stopped  = false;
  var sortMode = "relevancia";
  var allItems = [];
  var controller = new AbortController();

  // ── HELPERS ──
  function numericPrice(p) {
    var pr = p.prices;
    if (pr && pr.price != null) {
      var minor = isFinite(+pr.currency_minor_unit) ? +pr.currency_minor_unit : 2;
      var n = Number(pr.price);
      if (isFinite(n)) return n / Math.pow(10, minor);
    }
    var html = p.price_html || (pr && pr.price_html) || "";
    if (html) {
      var tmp = document.createElement("div");
      tmp.innerHTML = html;
      var text = tmp.textContent.replace(/\s+/g, " ").trim();
      var cleaned = text.replace(/[^\d,.\-]/g, "");
      if (!cleaned) return NaN;
      var num;
      if (cleaned.includes(",") && cleaned.includes(".")) num = Number(cleaned.replace(/,/g, ""));
      else if (cleaned.includes(",")) num = Number(cleaned.replace(/\./g, "").replace(",", "."));
      else num = Number(cleaned);
      return isFinite(num) ? num : NaN;
    }
    return NaN;
  }

  function formatPrice(p) {
    var pr = p.prices;
    var htmlSrc = (pr && pr.price_html) || p.price_html || "";
    if (htmlSrc) {
      var tmp = document.createElement("div");
      tmp.innerHTML = htmlSrc;
      var t = tmp.textContent && tmp.textContent.replace(/\s+/g, " ").trim();
      if (t) return t;
    }
    if (pr) {
      var currency = pr.currency_code || "UYU";
      var n = numericPrice(p);
      if (isFinite(n)) {
        try { return new Intl.NumberFormat("es-UY", { style: "currency", currency: currency }).format(n); }
        catch(e) { return currency + " " + n; }
      }
    }
    return "";
  }

  function normalizeItem(p) {
    var img = p.images && p.images[0];
    return {
      id:         p.id,
      name:       p.name || "(sin nombre)",
      link:       p.permalink || "#",
      image:      (img && (img.src || img.thumbnail)) || "",
      priceText:  formatPrice(p),
      priceValue: numericPrice(p),
    };
  }

  async function fetchJson(url, signal) {
    var r = await fetch(url, { cache: "no-store", signal: signal });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }

  // ── CONTROLS ──
  $("#stop").addEventListener("click", function() {
    stopped = true;
    try { controller.abort(); } catch(e) {}
    $("#hint").textContent = "Detenido.";
  });
  $("#top").addEventListener("click", function() { window.scrollTo({ top: 0, behavior: "smooth" }); });
  $("#clearPrice").addEventListener("click", function() {
    $("#minP").value = ""; $("#maxP").value = "";
    renderGrid();
  });
  ["input","change"].forEach(function(ev) {
    $("#q").addEventListener(ev, renderGrid);
    $("#minP").addEventListener(ev, renderGrid);
    $("#maxP").addEventListener(ev, renderGrid);
  });

  var sortModes  = ["relevancia","precio_asc","precio_desc"];
  var sortLabels = { relevancia: "Relevancia", precio_asc: "Precio \u2191", precio_desc: "Precio \u2193" };
  $("#sort").addEventListener("click", function() {
    var i = sortModes.indexOf(sortMode);
    sortMode = sortModes[(i + 1) % sortModes.length];
    $("#sortLabel").textContent = sortLabels[sortMode];
    renderGrid();
  });

  $("#exportCsv").addEventListener("click", function() {
    var rows = [["Nombre","Precio","URL"]];
    getFiltered().forEach(function(p) { rows.push(['"' + p.name + '"', p.priceText, p.link]); });
    var csv = rows.map(function(r) { return r.join(","); }).join("\n");
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    a.download = "dalaran-mgh.csv";
    a.click();
  });

  // ── FILTER ──
  function getFiltered() {
    var q    = ($("#q").value || "").trim().toLowerCase();
    var minV = parseFloat($("#minP").value);
    var maxV = parseFloat($("#maxP").value);
    var list = allItems.slice();
    if (q)           list = list.filter(function(p) { return p.name.toLowerCase().includes(q); });
    if (isFinite(minV)) list = list.filter(function(p) { return isFinite(p.priceValue) && p.priceValue >= minV; });
    if (isFinite(maxV)) list = list.filter(function(p) { return isFinite(p.priceValue) && p.priceValue <= maxV; });
    if (sortMode === "precio_asc")  list.sort(function(a,b) { return (isFinite(a.priceValue)?a.priceValue:Infinity)  - (isFinite(b.priceValue)?b.priceValue:Infinity); });
    if (sortMode === "precio_desc") list.sort(function(a,b) { return (isFinite(b.priceValue)?b.priceValue:-Infinity) - (isFinite(a.priceValue)?a.priceValue:-Infinity); });
    return list;
  }

  // ── BUILD CARD ──
  function buildCard(p, idx) {
    var a = document.createElement("a");
    a.className = "card";
    a.href = p.link;
    a.target = "_blank";
    a.rel = "noopener";
    a.style.animationDelay = Math.min(idx * 20, 400) + "ms";

    // Image wrap
    var imgWrap = document.createElement("div");
    imgWrap.className = "card-img-wrap";

    if (p.image) {
      var img = document.createElement("img");
      img.src = p.image;
      img.alt = p.name;
      img.loading = "lazy";
      (function(wrap, i) {
        i.onerror = function() {
          i.style.display = "none";
          var ni = document.createElement("div");
          ni.className = "card-no-img";
          ni.textContent = "\uD83C\uDFB2";
          wrap.appendChild(ni);
        };
      })(imgWrap, img);
      imgWrap.appendChild(img);
    } else {
      var ni = document.createElement("div");
      ni.className = "card-no-img";
      ni.textContent = "\uD83C\uDFB2";
      imgWrap.appendChild(ni);
    }

    // Badges
    var badges = document.createElement("div");
    badges.className = "card-badges";
    var bStock = document.createElement("span");
    bStock.className = "badge badge-instock";
    bStock.textContent = "In Stock";
    badges.appendChild(bStock);
    imgWrap.appendChild(badges);

    // Wishlist
    var wish = document.createElement("div");
    wish.className = "card-wish";
    wish.textContent = "\u2665";
    imgWrap.appendChild(wish);

    // Quick add
    var addBar = document.createElement("div");
    addBar.className = "card-add";
    addBar.textContent = "Ver en MGH \u2192";
    imgWrap.appendChild(addBar);

    a.appendChild(imgWrap);

    // Body
    var body = document.createElement("div");
    body.className = "card-body";

    var brand = document.createElement("div");
    brand.className = "card-brand";
    brand.textContent = "MGH";

    var name = document.createElement("div");
    name.className = "card-name";
    name.textContent = p.name;

    var priceRow = document.createElement("div");
    priceRow.className = "card-price-row";
    var price = document.createElement("div");
    price.className = "card-price";
    price.textContent = p.priceText || "";
    var priceLabel = document.createElement("div");
    priceLabel.className = "card-price-label";
    priceLabel.textContent = "Stock";
    priceRow.appendChild(price);
    priceRow.appendChild(priceLabel);

    body.appendChild(brand);
    body.appendChild(name);
    body.appendChild(priceRow);
    a.appendChild(body);
    return a;
  }

  // ── RENDER ──
  var gridEl   = $("#grid");
  var footerEl = $("#footer");

  function renderGrid() {
    var list = getFiltered();
    gridEl.innerHTML = "";
    if (list.length === 0 && allItems.length > 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.innerHTML = '<div class="empty-icon">\uD83D\uDD0D</div><p>No hay juegos que coincidan con tu b\u00fasqueda.</p>';
      gridEl.appendChild(empty);
      footerEl.textContent = "";
      $("#resultsCount").innerHTML = "0 resultados";
      return;
    }
    var frag = document.createDocumentFragment();
    list.forEach(function(p, i) { frag.appendChild(buildCard(p, i)); });
    gridEl.appendChild(frag);
    footerEl.textContent = list.length + " productos mostrados";
    $("#resultsCount").innerHTML = "<strong>" + list.length + "</strong> juegos encontrados";
  }

  function addSkeletons(n) {
    var frag = document.createDocumentFragment();
    for (var i = 0; i < n; i++) {
      var s = document.createElement("div");
      s.className = "skeleton";
      frag.appendChild(s);
    }
    gridEl.appendChild(frag);
  }

  function removeSkeletons() {
    gridEl.querySelectorAll(".skeleton").forEach(function(s) { s.remove(); });
  }

  // ── LOAD ──
  addSkeletons(24);

  var tagId = 0;
  try {
    var tags = await fetchJson(apiBase + "/products/tags?per_page=100", controller.signal);
    var tag = tags.find(function(t) {
      var n = String(t.name || "").toLowerCase();
      var sl = String(t.slug || "").toLowerCase();
      return n.includes("juegos de mesa") || sl.includes("juegos-de-mesa");
    });
    if (tag) tagId = tag.id;
  } catch(e) {}

  var tagParam = tagId ? "&tag=" + tagId : "";

  for (var page = 1; !stopped; page++) {
    try {
      var url = apiBase + "/products?per_page=" + PER_PAGE + "&page=" + page + "&stock_status=instock" + tagParam;
      var data = await fetchJson(url, controller.signal);
      if (!Array.isArray(data) || data.length === 0) break;

      var items = data.map(normalizeItem);
      allItems = allItems.concat(items);

      $("#countTotal").textContent = allItems.length;
      $("#hint").textContent = "Cargando\u2026 " + allItems.length + " productos";

      if (page === 1) {
        removeSkeletons();
        renderGrid();
      } else {
        var q2 = ($("#q").value || "").trim();
        var hasFilter = q2 || isFinite(parseFloat($("#minP").value)) || isFinite(parseFloat($("#maxP").value)) || sortMode !== "relevancia";
        if (!hasFilter) {
          var frag2 = document.createDocumentFragment();
          items.forEach(function(p, i) { frag2.appendChild(buildCard(p, i)); });
          gridEl.appendChild(frag2);
          footerEl.textContent = allItems.length + " productos mostrados";
          $("#resultsCount").innerHTML = "<strong>" + allItems.length + "</strong> juegos encontrados";
        } else {
          renderGrid();
        }
      }
      if (data.length < PER_PAGE) break;
    } catch(e) {
      if (!stopped) {
        removeSkeletons();
        if (allItems.length === 0) {
          gridEl.innerHTML = '<div class="empty"><div class="empty-icon">\u26A0\uFE0F</div><p>No se pudo conectar con la tienda.<br>Reintent\u00e1 en unos segundos.</p></div>';
        }
        $("#hint").textContent = "Error de conexi\u00f3n.";
        $("#hint").className = "err";
      }
      break;
    }
  }

  if (!stopped) {
    $("#countTotal").textContent = allItems.length;
    $("#hint").textContent = "\u2713 " + allItems.length + " productos cargados";
    $("#hint").className = "ok";
    $("#resultsCount").innerHTML = "<strong>" + allItems.length + "</strong> juegos encontrados";
  }
})();
</script>
</body>
</html>
