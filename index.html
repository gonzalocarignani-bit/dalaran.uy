<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dalaran — Juegos de Mesa Montevideo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f5f4f0;
      --bg2:     #ffffff;
      --bg3:     #edecea;
      --border:  #e2e0db;
      --text:    #1a1814;
      --muted:   #6b6760;
      --muted2:  #9b9890;
      --accent:  #2c4a7c;
      --accent2: #3a62a3;
      --green:   #237804;
      --blue:    #1d4ed8;
      --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --shadow2: 0 2px 8px rgba(0,0,0,.1), 0 8px 24px rgba(0,0,0,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOP BANNER ── */
    .top-banner {
      background: var(--text);
      color: #fff;
      text-align: center;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .2px;
    }
    .top-banner strong { color: #ffd666; }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 2px solid var(--text);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header-main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 64px;
    }
    .logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--accent); }
    .search-wrap {
      flex: 1;
      max-width: 560px;
      position: relative;
    }
    .search {
      width: 100%;
      padding: 10px 16px 10px 42px;
      border: 2px solid var(--text);
      border-radius: 6px;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,56,13,.12); }
    .search::placeholder { color: var(--muted2); font-weight: 400; }
    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 2px solid var(--text);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      background: var(--bg2);
      white-space: nowrap;
    }
    .stat-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    .btn {
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { border-color: var(--text); background: var(--bg3); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn.danger:hover { border-color: #cc0000; color: #cc0000; }
    .btn-cart {
      position: relative;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      padding: 8px 16px;
      gap: 6px;
    }
    .btn-cart:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .cart-count {
      background: #fff;
      color: var(--accent);
      font-size: 10px;
      font-weight: 900;
      min-width: 18px;
      height: 18px;
      border-radius: 99px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      line-height: 1;
    }
    /* card add-to-cart button */
    .card-add-btn {
      display: block;
      width: calc(100% - 24px);
      margin: 0 12px 12px;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .4px;
      text-align: center;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      opacity: 0;
    }
    .card:hover .card-add-btn { opacity: 1; }
    .card-add-btn.added { background: var(--green); }
    /* mini toast */
    .mini-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--text); color: #fff;
      padding: 11px 22px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: all .3s; z-index: 999;
      display: flex; align-items: center; gap: 10px;
      white-space: nowrap;
    }
    .mini-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .mini-toast a { color: #ffd666; font-weight: 700; text-decoration: none; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .toolbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 48px;
      flex-wrap: wrap;
    }
    .toolbar-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-right: 4px;
    }
    .price-range { display: flex; align-items: center; gap: 6px; }
    .price-range .sep { font-size: 12px; color: var(--muted2); }
    .num {
      width: 88px;
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    .num:focus { border-color: var(--accent); }
    .num::placeholder { color: var(--muted2); }
    .divider-v { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    #hint {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-left: auto;
    }
    #hint.ok  { color: var(--green); }
    #hint.err { color: var(--accent); }

    /* ── HERO MOSAIC ── */
    .hero {
      position: relative;
      overflow: hidden;
      background: var(--text);
      color: #fff;
      min-height: 240px;
    }

    /* Mosaic grid background */
    .hero-mosaic {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 2px;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .hero-mosaic.loaded { opacity: 1; }
    .mosaic-cell {
      background: #222;
      overflow: hidden;
      aspect-ratio: 1/1;
    }
    .mosaic-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.7) brightness(0.55);
      transition: filter .4s;
    }

    /* Dark overlay so text is always readable */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(26,24,20,.92) 0%,
        rgba(26,24,20,.75) 50%,
        rgba(26,24,20,.5) 100%
      );
    }

    /* Scroll shimmer — cells fade in one by one */
    @keyframes cellFadeIn {
      from { opacity: 0; transform: scale(1.08); }
      to   { opacity: 1; transform: scale(1); }
    }
    .mosaic-cell { animation: cellFadeIn .5s ease both; }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1440px;
      margin: 0 auto;
      padding: 44px 24px 40px;
      display: flex;
      align-items: flex-end;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-title {
      font-size: clamp(40px, 5.5vw, 76px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: .92;
      text-shadow: 0 2px 20px rgba(0,0,0,.4);
    }
    .hero-title em { color: #ffd666; font-style: normal; }
    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 4px;
    }
    .hero-meta p { font-size: 14px; color: rgba(255,255,255,.65); line-height: 1.55; max-width: 300px; }
    /* hero carousel strip */
    .hero-carousel {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 340px;
    }
    .hero-carousel-track {
      display: flex;
      gap: 10px;
      animation: carouselScroll 18s linear infinite;
      flex-shrink: 0;
    }
    @keyframes carouselScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .carousel-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.15);
      filter: brightness(.85);
      transition: filter .3s;
    }
    .carousel-thumb:hover { filter: brightness(1); }

    /* ── MAIN ── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── RESULTS HEADER ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }
    .results-count strong { color: var(--text); }
    .sort-wrap { display: flex; align-items: center; gap: 8px; }
    .sort-label { font-size: 12px; font-weight: 600; color: var(--muted); }

    /* ── TAG FILTER BAR ── */
    .tag-filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .tag-filter-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .8px;
      align-self: center;
      flex-shrink: 0;
    }
    .tag-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--bg2);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .tag-btn:hover { border-color: var(--text); color: var(--text); }
    .tag-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }
    .tag-btn .tag-icon { font-size: 13px; }

    /* ── PLAYER CHIP on card ── */
    .card-players {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg3);
      border-radius: 4px;
      padding: 2px 6px;
      margin-top: 4px;
      width: fit-content;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: box-shadow .18s, transform .18s, border-color .18s;
      animation: fadeIn .3s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      box-shadow: var(--shadow2);
      z-index: 2;
      transform: translateY(-3px);
      border-color: #c8c4bc;
    }

    /* ── CARD IMAGE ── */
    .card-img-wrap {
      position: relative;
      background: var(--bg3);
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: transform .3s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.04); }
    .card-no-img {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: .2;
    }

    /* wishlist btn */
    .card-wish {
      position: absolute;
      top: 8px; right: 8px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .2s, transform .2s;
      box-shadow: var(--shadow);
      z-index: 2;
    }
    .card:hover .card-wish { opacity: 1; transform: translateY(0); }

    /* badges */
    .card-badges {
      position: absolute;
      top: 8px; left: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .badge {
      padding: 3px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .3px;
      text-transform: uppercase;
      width: fit-content;
    }
    .badge-instock { background: var(--green); color: #fff; }
    .badge-new     { background: var(--blue); color: #fff; }

    /* quick-add bar */
    .card-add {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px;
      background: var(--text);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      letter-spacing: .3px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(100%);
      transition: opacity .2s, transform .2s;
    }
    .card:hover .card-add { opacity: 1; transform: translateY(0); }

    /* ── CARD BODY ── */
    .card-body {
      padding: 12px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .card-brand {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: auto;
    }
    .card-price {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.4px;
    }
    .card-price-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* ── SKELETON ── */
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 1600px 100%;
      animation: shimmer 1.4s infinite linear;
      aspect-ratio: 1.2;
    }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1/-1;
      padding: 80px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty p { font-size: 14px; font-weight: 500; }

    /* ── DEAL BADGE on card ── */
    .badge-off { background:var(--accent); color:#fff; font-size:11px !important; padding:4px 8px !important; }
    .card-deal .card-price { color:var(--accent); }
    .card-deal .card-price-original { font-size:12px; font-weight:600; color:var(--muted2); text-decoration:line-through; }
    .card-deal .card-price-row { flex-direction:column; gap:2px; align-items:flex-start; }
    .card-deal .card-price-bottom { display:flex; align-items:baseline; gap:6px; }

    /* ── FOOTER COUNT ── */
    .footer-bar {
      padding: 24px 0 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .header-main { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
      .logo { font-size: 20px; }
      .search-wrap { order: 3; flex: 1 1 100%; max-width: 100%; }
      .hero-inner { padding: 28px 16px; }
      .toolbar-inner { padding: 0 16px; height: auto; padding: 8px 16px; }
      main { padding: 16px 16px 40px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- TOP BANNER -->
<div class="top-banner">
  Dalaran &mdash; Juegos de Mesa en Montevideo &mdash; <strong>Envíos y retiro disponible</strong>
</div>

<!-- HEADER -->
<header>
  <div class="header-main">
    <a class="logo" href="#">Dala<span>ran</span></a>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input id="q" class="search" placeholder="Buscar juego de mesa..." autocomplete="off" />
    </div>
    <div class="header-right">
      <div class="stat-chip">
        <div class="dot"></div>
        
      </div>
      <a href="cart.html" class="btn btn-cart" id="cartBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Carrito
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </a>
      <button id="exportCsv" class="btn primary" style="display:none">&#8595; CSV</button>
      <button id="stop" class="btn danger">&#9632; Detener</button>
      <button id="top" class="btn">&#8593;</button>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-inner">
    <span class="toolbar-label">Precio</span>
    <div class="price-range">
      <input id="minP" class="num" type="number" inputmode="numeric" placeholder="Mín $" />
      <span class="sep">—</span>
      <input id="maxP" class="num" type="number" inputmode="numeric" placeholder="Máx $" />
      <button id="clearPrice" class="btn">&#10005;</button>
    </div>
    <div class="divider-v"></div>
    <button id="sort" class="btn">&#8597; <span id="sortLabel">Relevancia</span></button>
    <span id="hint">Conectando...</span>
  </div>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <!-- Mosaic background — filled by JS -->
  <div class="hero-mosaic" id="heroMosaic"></div>
  <div class="hero-overlay"></div>
  <div class="hero-inner">
    <h1 class="hero-title">Tu próxima<br><em>partida</em><br>empieza acá.</h1>
    <div class="hero-meta">
      <p>Los mejores juegos de mesa en Montevideo.<br>Precios honestos, envíos y retiro disponible.</p>
      <div class="hero-carousel" id="heroCarousel" style="display:none">
        <div class="hero-carousel-track" id="carouselTrack"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="results-header">
    <div class="results-count" id="resultsCount">Cargando productos...</div>
    <div class="sort-wrap">
      <span class="sort-label">Dalaran</span>
    </div>
  </div>

  <div class="tag-filter-bar">
    <span class="tag-filter-label">Filtrar:</span>
    <button class="tag-btn active" data-tag="todos"><span class="tag-icon">&#127922;</span> Todos</button>
    <button class="tag-btn" data-tag="cooperativo"><span class="tag-icon">&#129309;</span> Cooperativo</button>
    <button class="tag-btn" data-tag="familiar"><span class="tag-icon">&#128106;</span> Familiar</button>
    <button class="tag-btn" data-tag="aventura"><span class="tag-icon">&#9876;</span> Aventura</button>
    <button class="tag-btn" data-tag="ciencia-ficcion"><span class="tag-icon">&#128640;</span> Ciencia Ficci&oacute;n</button>
    <button class="tag-btn" data-tag="rol"><span class="tag-icon">&#129425;</span> Rol / RPG</button>
    <button class="tag-btn" data-tag="estrategia"><span class="tag-icon">&#9812;</span> Estrategia</button>
    <button class="tag-btn" data-tag="fiesta"><span class="tag-icon">&#127881;</span> Fiesta</button>
    <button class="tag-btn" data-tag="oferta" style="border-color:var(--accent);color:var(--accent);font-weight:800"><span class="tag-icon">&#128293;</span> Ofertas</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="footer" class="footer-bar"></div>
</main>

<script src="cart.js"></script>
<script>
(async () => {
  var PER_PAGE   = 100;
  var PROXY_BASE = "https://dalaran-proxy.gonzalo-carignani.workers.dev";
  var apiBase    = PROXY_BASE + "/api";
  var $ = function(s) { return document.querySelector(s); };

  var stopped    = false;
  var sortMode   = "relevancia";
  var activeTag  = "todos";
  var allItems   = [];
  var controller = new AbortController();

  // ── HELPERS ──
  function numericPrice(p) {
    var pr = p.prices;
    if (pr && pr.price != null) {
      var minor = isFinite(+pr.currency_minor_unit) ? +pr.currency_minor_unit : 2;
      var n = Number(pr.price);
      if (isFinite(n)) return n / Math.pow(10, minor);
    }
    var html = p.price_html || (pr && pr.price_html) || "";
    if (html) {
      var tmp = document.createElement("div");
      tmp.innerHTML = html;
      var text = tmp.textContent.replace(/\s+/g, " ").trim();
      var cleaned = text.replace(/[^\d,.\-]/g, "");
      if (!cleaned) return NaN;
      var num;
      if (cleaned.includes(",") && cleaned.includes(".")) num = Number(cleaned.replace(/,/g, ""));
      else if (cleaned.includes(",")) num = Number(cleaned.replace(/\./g, "").replace(",", "."));
      else num = Number(cleaned);
      return isFinite(num) ? num : NaN;
    }
    return NaN;
  }

  function formatPrice(p) {
    var pr = p.prices;
    var htmlSrc = (pr && pr.price_html) || p.price_html || "";
    if (htmlSrc) {
      var tmp = document.createElement("div");
      tmp.innerHTML = htmlSrc;
      var t = tmp.textContent && tmp.textContent.replace(/\s+/g, " ").trim();
      if (t) return t;
    }
    if (pr) {
      var currency = pr.currency_code || "UYU";
      var n = numericPrice(p);
      if (isFinite(n)) {
        try { return new Intl.NumberFormat("es-UY", { style: "currency", currency: currency }).format(n); }
        catch(e) { return currency + " " + n; }
      }
    }
    return "";
  }

  // Tag keyword maps for auto-classification
  var TAG_KEYWORDS = {
    "cooperativo":     ["cooperat","cooperaci","co-op","coop","collaborative","together"],
    "familiar":        ["familiar","familia","family","niños","kids","children","junior"],
    "aventura":        ["aventura","adventure","quest","dungeon","exploration","explore","explorar"],
    "ciencia-ficcion": ["sci-fi","scifi","science fiction","space","espacial","galactic","galaxy","futur","robot","cyber","alien"],
    "rol":             ["rol","rpg","role","roleplay","dungeon","d&d","pathfinder","campaign","campaña"],
    "estrategia":      ["estrategia","strategy","war","wargame","guerra","euro","worker placement","area control"],
    "fiesta":          ["fiesta","party","social","trivia","drinking","adults","adults only","adult"],
    "dos-jugadores":   ["2 jugadores","2 players","two player","para dos","duel","duelo","head to head"]
  };

  function inferTags(p) {
    var tags = [];
    // From WooCommerce tags
    var wcTags = (p.tags || []).map(function(t) { return (t.name || "").toLowerCase(); });
    // From WooCommerce categories
    var wcCats = (p.categories || []).map(function(c) { return (c.name || "").toLowerCase(); });
    // From name + short_description
    var text = [(p.name || ""), (p.short_description || ""), (p.description || "")].join(" ").toLowerCase();
    // From attributes
    var attrText = (p.attributes || []).map(function(a) {
      return (a.name || "") + " " + (a.options || []).join(" ");
    }).join(" ").toLowerCase();
    var allText = [text, attrText, wcTags.join(" "), wcCats.join(" ")].join(" ");

    Object.keys(TAG_KEYWORDS).forEach(function(tag) {
      var keywords = TAG_KEYWORDS[tag];
      for (var i = 0; i < keywords.length; i++) {
        if (allText.includes(keywords[i])) { tags.push(tag); break; }
      }
    });

    // Player count from attributes
    var minP = null, maxP = null;
    (p.attributes || []).forEach(function(attr) {
      var n = (attr.name || "").toLowerCase();
      var opts = (attr.options || []).join(" ");
      if (n.includes("jugador") || n.includes("player")) {
        var nums = opts.match(/\d+/g);
        if (nums) {
          var ns = nums.map(Number);
          minP = Math.min.apply(null, ns);
          maxP = Math.max.apply(null, ns);
        }
      }
    });
    // Also check min_players / max_players fields
    if (p.min_players) minP = p.min_players;
    if (p.max_players) maxP = p.max_players;

    // 2-player tag from player count
    if (maxP !== null && maxP <= 2) tags.push("dos-jugadores");
    if (minP !== null && minP <= 2 && !tags.includes("dos-jugadores")) tags.push("dos-jugadores");

    return { tags: tags, minPlayers: minP, maxPlayers: maxP };
  }

  function normalizeItem(p) {
    var img = p.images && p.images[0];
    var tagData = inferTags(p);
    var basePrice = numericPrice(p);
    var markedUp  = isFinite(basePrice) ? Math.round(basePrice * 1.25) : NaN;
    var currency  = (p.prices && p.prices.currency_code) || "UYU";
    function fmtUYU(n) {
      if (!isFinite(n)) return "";
      try { return new Intl.NumberFormat("es-UY",{style:"currency",currency:currency,maximumFractionDigits:0}).format(n); }
      catch(e) { return currency+" "+n; }
    }
    return {
      id:         p.id,
      name:       p.name || "(sin nombre)",
      link:       p.permalink || "#",
      image:      (img && (img.src || img.thumbnail)) || "",
      priceText:  isFinite(markedUp) ? fmtUYU(markedUp) : formatPrice(p),
      priceValue: isFinite(markedUp) ? markedUp : basePrice,
      tags:       tagData.tags,
      minPlayers: tagData.minPlayers,
      maxPlayers: tagData.maxPlayers,
    };
  }

  async function fetchJson(url, signal) {
    var r = await fetch(url, { cache: "no-store", signal: signal });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }

  // ── CONTROLS ──
  $("#stop").addEventListener("click", function() {
    stopped = true;
    try { controller.abort(); } catch(e) {}
    $("#hint").textContent = "Detenido.";
  });
  $("#top").addEventListener("click", function() { window.scrollTo({ top: 0, behavior: "smooth" }); });
  $("#clearPrice").addEventListener("click", function() {
    $("#minP").value = ""; $("#maxP").value = "";
    renderGrid();
  });
  ["input","change"].forEach(function(ev) {
    $("#q").addEventListener(ev, renderGrid);
    $("#minP").addEventListener(ev, renderGrid);
    $("#maxP").addEventListener(ev, renderGrid);
  });

  // Tag filter buttons
  document.querySelectorAll(".tag-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".tag-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      activeTag = btn.dataset.tag;
      renderGrid();
    });
  });

  var sortModes  = ["relevancia","precio_asc","precio_desc"];
  var sortLabels = { relevancia: "Relevancia", precio_asc: "Precio \u2191", precio_desc: "Precio \u2193" };
  $("#sort").addEventListener("click", function() {
    var i = sortModes.indexOf(sortMode);
    sortMode = sortModes[(i + 1) % sortModes.length];
    $("#sortLabel").textContent = sortLabels[sortMode];
    renderGrid();
  });

  $("#exportCsv").addEventListener("click", function() {
    var rows = [["Nombre","Precio","URL"]];
    getFiltered().forEach(function(p) { rows.push(['"' + p.name + '"', p.priceText, p.link]); });
    var csv = rows.map(function(r) { return r.join(","); }).join("\n");
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    a.download = "dalaran-productos.csv";
    a.click();
  });

  // ── FILTER ──
  function getFiltered() {
    var q    = ($("#q").value || "").trim().toLowerCase();
    var minV = parseFloat($("#minP").value);
    var maxV = parseFloat($("#maxP").value);
    var list = allItems.slice();
    if (q)              list = list.filter(function(p) { return p.name.toLowerCase().includes(q); });
    if (isFinite(minV)) list = list.filter(function(p) { return isFinite(p.priceValue) && p.priceValue >= minV; });
    if (isFinite(maxV)) list = list.filter(function(p) { return isFinite(p.priceValue) && p.priceValue <= maxV; });
    if (activeTag && activeTag !== "todos") {
      if (activeTag === "oferta") {
        list = list.filter(function(p) { return p.onSale; });
      } else {
        list = list.filter(function(p) { return p.tags && p.tags.indexOf(activeTag) !== -1; });
      }
    }
    if (sortMode === "precio_asc")  list.sort(function(a,b) { return (isFinite(a.priceValue)?a.priceValue:Infinity)  - (isFinite(b.priceValue)?b.priceValue:Infinity); });
    if (sortMode === "precio_desc") list.sort(function(a,b) { return (isFinite(b.priceValue)?b.priceValue:-Infinity) - (isFinite(a.priceValue)?a.priceValue:-Infinity); });
    return list;
  }

  // ── MARK DEALS ──
  var dealsRendered = false;

  function markDeals(items) {
    if (dealsRendered || items.length < 10) return;
    dealsRendered = true;
    var pool = items.filter(function(p){ return isFinite(p.priceValue) && p.priceValue > 0; });
    for (var i=pool.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=pool[i];pool[i]=pool[j];pool[j]=t; }
    pool.slice(0,10).forEach(function(p){ p.onSale = true; });
    renderGrid();
  }

  // ── BUILD CARD ──
  function buildCard(p, idx) {
    var isSale = !!p.onSale;
    var discPrice = isSale ? Math.round(p.priceValue * 0.9) : null;
    function fmtPrice(n) {
      try { return new Intl.NumberFormat("es-UY",{style:"currency",currency:"UYU",maximumFractionDigits:0}).format(n); }
      catch(e) { return "UYU "+n; }
    }

    var a = document.createElement("a");
    a.className = "card" + (isSale ? " card-deal" : "");
    a.href = "product.html?id=" + p.id;
    a.style.animationDelay = Math.min(idx * 20, 400) + "ms";

    // Image wrap
    var imgWrap = document.createElement("div");
    imgWrap.className = "card-img-wrap";

    if (p.image) {
      var img = document.createElement("img");
      img.src = p.image;
      img.alt = p.name;
      img.loading = "lazy";
      (function(wrap, i) {
        i.onerror = function() {
          i.style.display = "none";
          var ni = document.createElement("div");
          ni.className = "card-no-img";
          ni.textContent = "\uD83C\uDFB2";
          wrap.appendChild(ni);
        };
      })(imgWrap, img);
      imgWrap.appendChild(img);
    } else {
      var ni = document.createElement("div");
      ni.className = "card-no-img";
      ni.textContent = "\uD83C\uDFB2";
      imgWrap.appendChild(ni);
    }

    // Badges
    var badges = document.createElement("div");
    badges.className = "card-badges";
    if (isSale) {
      var bOff = document.createElement("span");
      bOff.className = "badge badge-off";
      bOff.textContent = "10% OFF";
      badges.appendChild(bOff);
    } else {
      // no stock badge — clean look
    }
    imgWrap.appendChild(badges);

    var wish = document.createElement("div");
    wish.className = "card-wish";
    wish.textContent = "\u2665";
    imgWrap.appendChild(wish);

    var addBar = document.createElement("div");
    addBar.className = "card-add";
    addBar.textContent = isSale ? "Ver oferta \u2192" : "Ver producto \u2192";
    imgWrap.appendChild(addBar);

    a.appendChild(imgWrap);

    // Body
    var body = document.createElement("div");
    body.className = "card-body";

    var brand = document.createElement("div");
    brand.className = "card-brand";
    if (p.minPlayers || p.maxPlayers) {
      var pmin = p.minPlayers || "?";
      var pmax = p.maxPlayers || "?";
      brand.textContent = pmin === pmax ? pmin + " jugadores" : pmin + "\u2013" + pmax + " jugadores";
    } else {
      brand.textContent = "Juego de Mesa";
    }

    var name = document.createElement("div");
    name.className = "card-name";
    name.textContent = p.name;

    var priceRow = document.createElement("div");
    priceRow.className = "card-price-row";

    if (isSale && discPrice) {
      // Crossed original + discounted price
      var orig = document.createElement("div");
      orig.className = "card-price-original";
      orig.textContent = p.priceText || fmtPrice(p.priceValue);

      var bottom = document.createElement("div");
      bottom.className = "card-price-bottom";
      var disc = document.createElement("div");
      disc.className = "card-price";
      disc.textContent = fmtPrice(discPrice);
      var saving = document.createElement("div");
      saving.className = "card-price-label";
      saving.textContent = "Oferta";
      bottom.appendChild(disc);
      bottom.appendChild(saving);

      priceRow.appendChild(orig);
      priceRow.appendChild(bottom);
    } else {
      var price = document.createElement("div");
      price.className = "card-price";
      price.textContent = p.priceText || "";
      priceRow.appendChild(price);
    }

    body.appendChild(brand);
    body.appendChild(name);
    body.appendChild(priceRow);
    a.appendChild(body);

    // Add to cart button
    var addBtn = document.createElement("button");
    addBtn.className = "card-add-btn";
    addBtn.textContent = isSale ? "+ Agregar (oferta)" : "+ Agregar al carrito";
    (function(btn, prod) {
      btn.addEventListener("click", function(e) {
        e.preventDefault(); e.stopPropagation();
        DalaranCart.add({ id: prod.id, name: prod.name, image: prod.image, priceText: prod.priceText, priceValue: prod.priceValue });
        btn.textContent = "✓ Agregado";
        btn.classList.add("added");
        setTimeout(function(){ btn.textContent = isSale ? "+ Agregar (oferta)" : "+ Agregar al carrito"; btn.classList.remove("added"); }, 1500);
        showMiniToast(prod.name);
      });
    })(addBtn, p);
    a.appendChild(addBtn);

    return a;
  }

  function showMiniToast(name) {
    var t = document.getElementById("miniToast");
    if (!t) return;
    t.querySelector(".toast-name").textContent = name.substring(0,30)+(name.length>30?"…":"");
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove("show"); }, 2800);
  }

  // ── RENDER ──
  var gridEl   = $("#grid");
  var footerEl = $("#footer");

  function renderGrid() {
    var list = getFiltered();
    gridEl.innerHTML = "";
    if (list.length === 0 && allItems.length > 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.innerHTML = '<div class="empty-icon">\uD83D\uDD0D</div><p>No hay juegos que coincidan con tu b\u00fasqueda.</p>';
      gridEl.appendChild(empty);
      footerEl.textContent = "";
      $("#resultsCount").innerHTML = "0 resultados";
      return;
    }
    var frag = document.createDocumentFragment();
    list.forEach(function(p, i) { frag.appendChild(buildCard(p, i)); });
    gridEl.appendChild(frag);
    footerEl.textContent = list.length + " productos mostrados";
    $("#resultsCount").innerHTML = "<strong>" + list.length + "</strong> juegos encontrados";
  }

  // ── HERO MOSAIC ──
  var mosaicImages = [];
  var mosaicFilled = false;

  function fillMosaic(items) {
    if (mosaicFilled) return;
    var mosaic = document.getElementById("heroMosaic");
    if (!mosaic) return;

    // Calculate how many cells fit
    var cellW = 92; // approx cell width
    var heroW = mosaic.offsetWidth || window.innerWidth;
    var heroH = 240;
    var cols = Math.ceil(heroW / cellW) + 1;
    var rows = Math.ceil(heroH / cellW) + 1;
    var total = cols * rows;

    // Get images with valid src
    var imgs = items
      .filter(function(p) { return p.image; })
      .map(function(p) { return p.image; });

    if (imgs.length < 4) return; // not enough yet

    // Shuffle
    var pool = imgs.slice();
    for (var i = pool.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
    }

    mosaic.innerHTML = "";
    for (var k = 0; k < total; k++) {
      var cell = document.createElement("div");
      cell.className = "mosaic-cell";
      cell.style.animationDelay = Math.random() * 0.6 + "s";
      var img = document.createElement("img");
      img.src = pool[k % pool.length];
      img.loading = "lazy";
      img.alt = "";
      cell.appendChild(img);
      mosaic.appendChild(cell);
    }

    mosaic.classList.add("loaded");
    mosaicFilled = true;
  }

  // Carousel in hero
  var carouselFilled = false;
  function fillCarousel(items) {
    if (carouselFilled) return;
    var imgs = items.filter(function(p){return p.image;}).map(function(p){return p.image;});
    if (imgs.length < 6) return;
    // Shuffle
    var pool = imgs.slice();
    for (var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
    // Take 10 for a smooth loop (duplicate for seamless scroll)
    var picks = pool.slice(0, 10);
    var doubled = picks.concat(picks); // duplicate for infinite loop
    var track = document.getElementById("carouselTrack");
    if (!track) return;
    track.innerHTML = "";
    doubled.forEach(function(src){
      var img = document.createElement("img");
      img.src = src; img.alt = ""; img.className = "carousel-thumb"; img.loading = "lazy";
      track.appendChild(img);
    });
    document.getElementById("heroCarousel").style.display = "";
    carouselFilled = true;
  }
  function animateCount() {} // no-op kept for compat

  function addSkeletons(n) {
    var frag = document.createDocumentFragment();
    for (var i = 0; i < n; i++) {
      var s = document.createElement("div");
      s.className = "skeleton";
      frag.appendChild(s);
    }
    gridEl.appendChild(frag);
  }

  function removeSkeletons() {
    gridEl.querySelectorAll(".skeleton").forEach(function(s) { s.remove(); });
  }

  // ── LOAD ──
  // ── ADMIN MODE ──
  if (new URLSearchParams(window.location.search).get("admin") === "1") {
    var csvBtn = document.getElementById("exportCsv");
    if (csvBtn) csvBtn.style.display = "";
  }

  // ── CART COUNT ──
  function updateCartCount() {
    var n = DalaranCart.count();
    var el = document.getElementById("cartCount");
    if (!el) return;
    el.textContent = n;
    el.style.display = n > 0 ? "" : "none";
  }
  updateCartCount();
  DalaranCart.onChange(updateCartCount);

  // ── SESSION CACHE ──
  var CACHE_KEY = "dalaran_products_v1";
  var CACHE_TS  = "dalaran_products_ts";
  var CACHE_TTL = 10 * 60 * 1000; // 10 min

  function saveCache(items) {
    try {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify(items));
      sessionStorage.setItem(CACHE_TS, Date.now().toString());
    } catch(e) {}
  }

  function loadCache() {
    try {
      var ts = parseInt(sessionStorage.getItem(CACHE_TS) || "0");
      if (Date.now() - ts > CACHE_TTL) return null;
      var raw = sessionStorage.getItem(CACHE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  // Try cache first — instant render
  var cached = loadCache();
  if (cached && cached.length > 0) {
    allItems = cached;
    renderGrid();
    animateCount(allItems.length);
    fillMosaic(allItems);
    markDeals(allItems);
    $("#hint").textContent = "\u2713 " + allItems.length + " productos (cach\u00e9)";
    $("#hint").className = "ok";
    $("#resultsCount").innerHTML = "<strong>" + allItems.length + "</strong> juegos encontrados";
    stopped = true; // skip network fetch
  } else {
    addSkeletons(24);
  }

  var tagId = 0;
  try {
    var tags = await fetchJson(apiBase + "/products/tags?per_page=100", controller.signal);
    var tag = tags.find(function(t) {
      var n = String(t.name || "").toLowerCase();
      var sl = String(t.slug || "").toLowerCase();
      return n.includes("juegos de mesa") || sl.includes("juegos-de-mesa");
    });
    if (tag) tagId = tag.id;
  } catch(e) {}

  var tagParam = tagId ? "&tag=" + tagId : "";

  for (var page = 1; !stopped; page++) {
    try {
      var url = apiBase + "/products?per_page=" + PER_PAGE + "&page=" + page + "&stock_status=instock" + tagParam;
      var data = await fetchJson(url, controller.signal);
      if (!Array.isArray(data) || data.length === 0) break;

      var items = data.map(normalizeItem);
      allItems = allItems.concat(items);

      $("#hint").textContent = "Cargando\u2026 " + allItems.length + " productos";
      animateCount(allItems.length);
      if (!mosaicFilled && allItems.length >= 20) fillMosaic(allItems);
      if (!dealsRendered && allItems.length >= 10) markDeals(allItems);

      if (page === 1) {
        removeSkeletons();
        renderGrid();
      } else {
        var q2 = ($("#q").value || "").trim();
        var hasFilter = q2 || isFinite(parseFloat($("#minP").value)) || isFinite(parseFloat($("#maxP").value)) || sortMode !== "relevancia" || (activeTag && activeTag !== "todos");
        if (!hasFilter) {
          var frag2 = document.createDocumentFragment();
          items.forEach(function(p, i) { frag2.appendChild(buildCard(p, i)); });
          gridEl.appendChild(frag2);
          footerEl.textContent = allItems.length + " productos mostrados";
          $("#resultsCount").innerHTML = "<strong>" + allItems.length + "</strong> juegos encontrados";
        } else {
          renderGrid();
        }
      }
      if (data.length < PER_PAGE) break;
    } catch(e) {
      if (!stopped) {
        removeSkeletons();
        if (allItems.length === 0) {
          gridEl.innerHTML = '<div class="empty"><div class="empty-icon">\u26A0\uFE0F</div><p>No se pudo conectar con la tienda.<br>Reintent\u00e1 en unos segundos.</p></div>';
        }
        $("#hint").textContent = "Error de conexi\u00f3n.";
        $("#hint").className = "err";
      }
      break;
    }
  }

  if (!stopped) {
    if (!mosaicFilled) fillMosaic(allItems);
    if (!carouselFilled) fillCarousel(allItems);
    if (!dealsRendered) markDeals(allItems);
    saveCache(allItems);
    $("#hint").textContent = "\u2713 " + allItems.length + " productos cargados";
    $("#hint").className = "ok";
    $("#resultsCount").innerHTML = "<strong>" + allItems.length + "</strong> juegos encontrados";
  }
})();
</script>
<div class="mini-toast" id="miniToast">
  <span>&#10003; <span class="toast-name"></span></span>
  <a href="cart.html">Ver carrito &rarr;</a>
</div>
</body>
