<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mi Cuenta — Dalaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f4f0; --bg2:#fff; --bg3:#edecea; --border:#e2e0db;
      --text:#1a1814; --muted:#6b6760; --muted2:#9b9890;
      --accent:#2c4a7c; --accent2:#3a62a3;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    .top-banner{background:var(--text);color:#fff;text-align:center;padding:8px 16px;font-size:12px;font-weight:500;}
    .top-banner strong{color:#ffd666;}
    header{background:var(--bg2);border-bottom:2px solid var(--text);position:sticky;top:0;z-index:100;}
    .header-inner{max-width:1440px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:64px;gap:16px;}
    .logo{font-size:24px;font-weight:900;letter-spacing:-1px;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent);}
    .header-links{margin-left:auto;display:flex;align-items:center;gap:12px;}
    .header-links a{font-size:13px;font-weight:600;color:var(--text);text-decoration:none;padding:8px 14px;border:2px solid var(--border);border-radius:6px;transition:border-color .15s;}
    .header-links a:hover{border-color:var(--text);}
    .btn-logout{background:none;border:2px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
    .btn-logout:hover{border-color:var(--text);color:var(--text);}

    .content{max-width:1200px;margin:0 auto;padding:40px 40px 80px;}

    /* Profile header */
    .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:36px;}
    .avatar{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0;}
    .profile-name{font-size:22px;font-weight:900;}
    .profile-email{font-size:13px;color:var(--muted);margin-top:2px;}

    /* Tabs */
    .tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:28px;}
    .tab{padding:10px 20px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--text);border-bottom-color:var(--text);}

    /* Cards */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;}
    .card-title{font-size:14px;font-weight:800;margin-bottom:18px;}

    /* Profile form */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:560px){.form-grid{grid-template-columns:1fr;}}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group.full{grid-column:1/-1;}
    .form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
    .form-input{padding:10px 12px;border:2px solid var(--border);border-radius:7px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;}
    .form-input:focus{border-color:var(--text);background:var(--bg2);}
    .btn-save{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px;}
    .btn-save:hover{background:var(--accent2);}
    .save-ok{font-size:12px;color:#237804;font-weight:700;margin-top:8px;display:none;}

    /* Orders — clickable */
    .order-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:border-color .15s, box-shadow .15s;}
    .order-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(44,74,124,.1);}
    .order-card .click-hint{font-size:11px;color:var(--muted2);margin-top:8px;}
    .order-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
    .order-id{font-size:13px;font-weight:800;color:var(--accent);}
    .order-date{font-size:12px;color:var(--muted);}
    .order-total{font-size:15px;font-weight:900;}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
    .badge-pendiente{background:#fff7e6;color:#d46b08;}
    .badge-confirmado{background:#e6f4ff;color:#0958d9;}
    .badge-enviado{background:#f6ffed;color:#389e0d;}
    .badge-entregado{background:#d9f7be;color:#237804;}
    .badge-cancelado{background:#fff1f0;color:#cf1322;}
    .order-items{font-size:12px;color:var(--muted);line-height:1.8;}

    /* Order modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
    .modal-title{font-size:16px;font-weight:800;}
    .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:color .15s;line-height:1;}
    .modal-close:hover{color:var(--text);}
    .modal-body{padding:24px;}
    .modal-section{margin-bottom:20px;}
    .modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;}
    .modal-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;}
    .modal-row span:first-child{color:var(--muted);}
    .modal-row span:last-child{font-weight:600;text-align:right;max-width:280px;}
    .modal-items-table{width:100%;border-collapse:collapse;}
    .modal-items-table td{padding:8px 0;font-size:13px;border-bottom:1px solid var(--border);}
    .modal-items-table tr:last-child td{border-bottom:none;}
    .modal-total{display:flex;justify-content:space-between;font-size:16px;font-weight:900;padding-top:14px;border-top:2px solid var(--border);margin-top:8px;}
    .modal-total span:last-child{color:var(--accent);}

    /* Wishlist */
    .wishlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
    .wish-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .15s;}
    .wish-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .wish-img{width:100%;height:130px;object-fit:cover;background:var(--bg3);display:block;}
    .wish-img-placeholder{width:100%;height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;}
    .wish-body{padding:12px;}
    .wish-name{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3;}
    .wish-price{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:10px;}
    .wish-actions{display:flex;gap:8px;}
    .btn-wish-cart{flex:1;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
    .btn-wish-cart:hover{background:var(--accent2);}
    .btn-wish-remove{padding:8px 10px;background:none;border:2px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;transition:border-color .15s;}
    .btn-wish-remove:hover{border-color:#cf1322;}

    /* Empty states */
    .empty{text-align:center;padding:48px 20px;color:var(--muted);}
    .empty-icon{font-size:40px;margin-bottom:12px;}
    .empty p{font-size:14px;margin-bottom:16px;}
    .empty a{display:inline-block;padding:10px 20px;background:var(--accent);color:#fff;border-radius:7px;font-size:13px;font-weight:700;text-decoration:none;}
    .empty a:hover{background:var(--accent2);}

    .loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<div class="top-banner">🎲 Envíos a domicilio en Montevideo &mdash; <strong>Juegos de mesa para todos los gustos</strong></div>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">Dala<span>ran</span></a>
    <div class="header-links">
      <a href="index.html">&#127922; Catálogo</a>
      <a href="cart.html">&#128722; Carrito</a>
      <button class="btn-logout" id="btnLogout">Salir</button>
    </div>
  </div>
</header>

<div class="content">
  <div class="profile-header">
    <div class="avatar" id="avatarInitial">?</div>
    <div>
      <div class="profile-name" id="profileName">Cargando...</div>
      <div class="profile-email" id="profileEmail"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="orders">Mis pedidos</button>
    <button class="tab" data-tab="wishlist">Favoritos</button>
    <button class="tab" data-tab="profile">Mi perfil</button>
  </div>

  <!-- ORDERS -->
  <div id="tab-orders">
    <div class="loading" id="ordersLoading"><span class="spinner"></span>Cargando pedidos...</div>
    <div id="ordersList" style="display:none"></div>
  </div>

  <!-- WISHLIST -->
  <div id="tab-wishlist" style="display:none">
    <div class="loading" id="wishlistLoading"><span class="spinner"></span>Cargando favoritos...</div>
    <div id="wishlistGrid" style="display:none"></div>
  </div>

  <!-- PROFILE -->
  <div id="tab-profile" style="display:none">
    <div class="card">
      <div class="card-title">Información personal</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input class="form-input" id="pName" type="text" placeholder="Juan García">
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input class="form-input" id="pPhone" type="tel" placeholder="09x xxx xxx">
        </div>
        <div class="form-group full">
          <label class="form-label">Dirección de entrega</label>
          <input class="form-input" id="pAddress" type="text" placeholder="Ej: Av. 18 de Julio 1234, apto 5, Montevideo">
        </div>
      </div>
      <div style="margin-top:16px;display:flex;align-items:center;gap:12px;">
        <button class="btn-save" id="btnSaveProfile">Guardar cambios</button>
        <span class="save-ok" id="saveOk">✓ Guardado</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Pedido</span>
      <button class="modal-close" id="modalClose">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="cart.js"></script>
<script>
(function() {
  var API_URL = "https://dalaran-backend-production.up.railway.app";

  // ── Auth guard ─────────────────────────────────────────────
  var token = localStorage.getItem("dalaran_token");
  if (!token) { location.href = "auth.html?redirect=account.html"; return; }

  var user = {};
  try { user = JSON.parse(localStorage.getItem("dalaran_user") || "{}"); } catch(e){}

  function authHeaders() {
    return { "Content-Type":"application/json", "Authorization":"Bearer "+token };
  }

  // ── Header ─────────────────────────────────────────────────
  function renderHeader() {
    document.getElementById("profileName").textContent  = user.name || user.email || "Mi cuenta";
    document.getElementById("profileEmail").textContent = user.email || "";
    document.getElementById("avatarInitial").textContent = (user.name||user.email||"?")[0].toUpperCase();
  }
  renderHeader();

  // ── Tabs ───────────────────────────────────────────────────
  var loadedTabs = {};
  document.querySelectorAll(".tab").forEach(function(tab) {
    tab.addEventListener("click", function() {
      document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
      tab.classList.add("active");
      var name = tab.dataset.tab;
      document.querySelectorAll("[id^='tab-']").forEach(function(el){ el.style.display="none"; });
      document.getElementById("tab-"+name).style.display = "";
      if (!loadedTabs[name]) { loadedTabs[name]=true; loadTab(name); }
    });
  });

  // Load initial tab
  loadedTabs["orders"] = true;
  loadOrders();

  function loadTab(name) {
    if (name==="orders")   loadOrders();
    if (name==="wishlist") loadWishlist();
    if (name==="profile")  loadProfile();
  }

  // ── Orders ─────────────────────────────────────────────────
  function loadOrders() {
    fetch(API_URL+"/api/orders/mine", { headers: authHeaders() })
      .then(function(r){
        if(r.status===401){ logout(); return null; }
        return r.json();
      })
      .then(function(data) {
        if (!data) return;
        document.getElementById("ordersLoading").style.display = "none";
        document.getElementById("ordersList").style.display = "";
        var orders = data.orders || [];
        if (!orders.length) {
          document.getElementById("ordersList").innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Todavía no tenés pedidos</p><a href="index.html">Ver catálogo</a></div>';
          return;
        }
        document.getElementById("ordersList").innerHTML = orders.map(function(o) {
          var items = Array.isArray(o.items) ? o.items : [];
          var itemsText = items.map(function(i){ return i.name+" ×"+i.qty; }).join(" · ");
          var d = new Date((o.created_at||"").replace(" ","T")+"Z");
          var dateStr = d.toLocaleDateString("es-UY",{day:"2-digit",month:"2-digit",year:"numeric"});
          return '<div class="order-card" data-order="'+encodeURIComponent(JSON.stringify(o))+'">'
            +'<div class="order-top">'
            +'<div><span class="order-id">Pedido #'+o.id+'</span> <span class="order-date">'+dateStr+'</span></div>'
            +'<div style="display:flex;align-items:center;gap:10px"><span class="badge badge-'+o.status+'">'+o.status+'</span><span class="order-total">'+fmt(o.total)+'</span></div>'
            +'</div>'
            +'<div class="order-items">'+itemsText+'</div>'
            +'<div class="click-hint">Tocá para ver el detalle →</div>'
            +'</div>';
        }).join("");

        // Click to open modal
        document.querySelectorAll(".order-card[data-order]").forEach(function(card) {
          card.addEventListener("click", function() {
            var o = JSON.parse(decodeURIComponent(card.dataset.order));
            openOrderModal(o);
          });
        });
      })
      .catch(function(){ document.getElementById("ordersLoading").innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error al cargar pedidos</p></div>'; });
  }

  // ── Wishlist ────────────────────────────────────────────────
  function loadWishlist() {
    fetch(API_URL+"/api/wishlist", { headers: authHeaders() })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        document.getElementById("wishlistLoading").style.display="none";
        document.getElementById("wishlistGrid").style.display="";
        var items = data.items || [];
        if (!items.length) {
          document.getElementById("wishlistGrid").innerHTML = '<div class="empty"><div class="empty-icon">♡</div><p>No tenés favoritos todavía.<br>Marcá productos con el corazón.</p><a href="index.html">Ver catálogo</a></div>';
          return;
        }
        document.getElementById("wishlistGrid").innerHTML = '<div class="wishlist-grid">'
          + items.map(function(item) {
            var img = item.image
              ? '<img class="wish-img" src="'+item.image+'" alt="'+item.product_name+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
                +'<div class="wish-img-placeholder" style="display:none">🎲</div>'
              : '<div class="wish-img-placeholder">🎲</div>';
            return '<div class="wish-card">'
              +img
              +'<div class="wish-body">'
              +'<div class="wish-name">'+item.product_name+'</div>'
              +'<div class="wish-price">'+item.price_text+'</div>'
              +'<div class="wish-actions">'
              +'<button class="btn-wish-cart" data-id="'+item.product_id+'" data-name="'+item.product_name+'" data-price="'+item.price_value+'" data-pricetext="'+item.price_text+'">+ Agregar al carrito</button>'
              +'<button class="btn-wish-remove" data-id="'+item.product_id+'" title="Quitar de favoritos">🗑</button>'
              +'</div></div></div>';
          }).join("")
          +'</div>';

        // Add to cart buttons
        document.querySelectorAll(".btn-wish-cart").forEach(function(btn){
          btn.addEventListener("click", function(){
            Cart.add({ id:Number(btn.dataset.id), name:btn.dataset.name, priceValue:Number(btn.dataset.price), priceText:btn.dataset.pricetext, qty:1 });
            showToast("Agregado al carrito");
          });
        });
        // Remove buttons
        document.querySelectorAll(".btn-wish-remove").forEach(function(btn){
          btn.addEventListener("click", function(){
            var id = Number(btn.dataset.id);
            fetch(API_URL+"/api/wishlist/"+id, { method:"DELETE", headers:authHeaders() })
              .then(function(){ loadedTabs["wishlist"]=false; loadWishlist(); showToast("Quitado de favoritos"); });
          });
        });
      })
      .catch(function(){ document.getElementById("wishlistLoading").innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error al cargar favoritos</p></div>'; });
  }

  // ── Profile ─────────────────────────────────────────────────
  function loadProfile() {
    document.getElementById("pName").value    = user.name    || "";
    document.getElementById("pPhone").value   = user.phone   || "";
    document.getElementById("pAddress").value = user.address || "";
  }

  document.getElementById("btnSaveProfile").addEventListener("click", function() {
    var btn = this;
    btn.textContent="Guardando..."; btn.disabled=true;
    fetch(API_URL+"/api/auth/me", {
      method:"PUT", headers: authHeaders(),
      body: JSON.stringify({
        name:    document.getElementById("pName").value.trim(),
        phone:   document.getElementById("pPhone").value.trim(),
        address: document.getElementById("pAddress").value.trim(),
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      btn.textContent="Guardar cambios"; btn.disabled=false;
      if (data.user) {
        user = data.user;
        localStorage.setItem("dalaran_user", JSON.stringify(user));
        renderHeader();
        var ok = document.getElementById("saveOk");
        ok.style.display="inline"; setTimeout(function(){ ok.style.display="none"; }, 2500);
      }
    })
    .catch(function(){ btn.textContent="Guardar cambios"; btn.disabled=false; showToast("Error al guardar"); });
  });

  // ── Order Modal ──────────────────────────────────────────────
  function openOrderModal(o) {
    var STATUS_LABELS = { pendiente:"Pendiente", confirmado:"Confirmado", enviado:"Enviado", entregado:"Entregado", cancelado:"Cancelado" };
    var items = Array.isArray(o.items) ? o.items : [];
    var d = new Date((o.created_at||"").replace(" ","T")+"Z");
    var dateStr = d.toLocaleDateString("es-UY",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit",timeZone:"America/Montevideo"});

    document.getElementById("modalTitle").textContent = "Pedido #"+o.id;
    document.getElementById("modalBody").innerHTML =
      '<div class="modal-section">'
      +'<div class="modal-section-title">Resumen</div>'
      +'<div class="modal-row"><span>Fecha</span><span>'+dateStr+'</span></div>'
      +'<div class="modal-row"><span>Estado</span><span><span class="badge badge-'+o.status+'">'+(STATUS_LABELS[o.status]||o.status)+'</span></span></div>'
      +'<div class="modal-row"><span>Dirección</span><span>'+o.address+'</span></div>'
      +'</div>'
      +'<div class="modal-section">'
      +'<div class="modal-section-title">Productos</div>'
      +'<table class="modal-items-table"><tbody>'
      + items.map(function(i){
          return '<tr><td>'+i.name+'</td>'
            +'<td style="text-align:center;color:var(--muted);padding:8px 12px;">×'+i.qty+'</td>'
            +'<td style="text-align:right;font-weight:700;">'+fmt((i.priceValue||0)*(i.qty||1))+'</td></tr>';
        }).join("")
      +'</tbody></table>'
      +'<div class="modal-row" style="margin-top:10px;"><span style="color:var(--muted)">Envío</span><span>'+fmt(o.shipping||175)+'</span></div>'
      +'<div class="modal-total"><span>Total</span><span>'+fmt(o.total)+'</span></div>'
      +'</div>';

    document.getElementById("orderModal").classList.add("open");
  }

  document.getElementById("modalClose").addEventListener("click", function() {
    document.getElementById("orderModal").classList.remove("open");
  });
  document.getElementById("orderModal").addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("open");
  });

  // ── Logout ──────────────────────────────────────────────────
  document.getElementById("btnLogout").addEventListener("click", logout);
  function logout() {
    localStorage.removeItem("dalaran_token");
    localStorage.removeItem("dalaran_user");
    location.href = "index.html";
  }

  // ── Helpers ──────────────────────────────────────────────────
  function fmt(n) {
    try { return new Intl.NumberFormat("es-UY",{style:"currency",currency:"UYU",maximumFractionDigits:0}).format(n); }
    catch(e){ return "UYU "+n; }
  }

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent=msg; t.classList.add("show");
    clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove("show"); }, 2500);
  }

})();
</script>
